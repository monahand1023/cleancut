name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest --tb=short --cov=cleancut --cov-fail-under=80

  # The lazy-import extras (llm, scenes) must stay installable — a broken pin
  # or import would otherwise ship silently since unit tests mock them.
  extras-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install light extras
        run: pip install -e ".[llm,scenes]"

      - name: Import check
        run: |
          python -c "import ollama; from scenedetect import ContentDetector"
          python -c "from cleancut.cli import build_parser; build_parser()"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          curl -sSL -o osv-scanner https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x osv-scanner

      - name: Scan for known vulnerabilities
        run: ./osv-scanner scan source -r .
